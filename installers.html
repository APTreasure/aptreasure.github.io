    <style>
        /* Add colours */
        :root {
            --blue: rgb(132, 210, 255);
            --red: rgb(255, 127, 127);
            --pink: rgb(255, 158, 218);
            --green: rgb(126, 255, 132);
        }



        /* Adjust body */
        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e2328;
        }



        .navigation { /* The navigation bar, it is hosted on navigation.html so not much css here */
            margin: 0;
            padding: 0; /* Fix positioning again */
            width: 100%;
            height: 3rem; /* Change width/height back to normal */
            position: sticky;
            top: 0; /* Make it so that when you scroll, it will stay at the top of the screen */
            min-width: 50rem;
        }

        .list {
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            width: 50vw;
            margin-left: calc(25vw - .5rem);
            border: 1px solid #303841;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            min-width: 35rem;
        }

        /* Fix list */
        .list, .popup {
            color: white;
            font-weight: bold;
        }
        /* Align the list in boxes */
        .listObj {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
            /* Adjust padding and enable boxes format for list objects */
            .listObj p, .listObj a {
                width: 25%;
                max-width: 25%;
                padding-top: 0;
                padding-bottom: 0;
                margin-top: 0.35rem;
                margin-bottom: 0.35rem;
                padding-left: 0.5rem;
                padding-right: 0.5rem;
            }

            /* Make images the size of text, and circular */
            .listObj img {
                width: 20px;
                height: 20px;
                margin-left: 0.5rem;
                border-radius: 100%;
            }
        /* Make list objects not centered */
        .game, .serv {
            text-align: left;
        }

        .vers, .down {
            text-align: right;
        }

        /* Change the opacity of the versions from each list object */
        .vers {
            opacity: 30%;
        }
        /* Adjust colours */
        .down {
            color: var(--blue);
        }

        .r {
            color: var(--red);
        }

        .rb {
            border-color: var(--red);
            margin-left: 0.5rem;
        }

        .g {
            color: var(--green);
        }

        .p {
            color: var(--pink);
        }


        /* Button */
        button { /* Change button */
            background-color: #21272c;
            border-radius: 1rem;
            border: 2px solid var(--blue);
            padding: 0.3rem 0rem 0.3rem 0rem;
            cursor: pointer;
        }

        .popupa.down {
            padding: 0rem 0.8rem 0rem 0.8rem;
            text-decoration: none;
        }



        /* Popup */
        .popup, .popupObj {
            line-height: normal;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background-color: #21272c;
            border: 1px solid #303841;
            border-radius: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.2s; /* Add transition */
            z-index: 9999;
        }

            /* Change opacity when it has the visible class */
            .popup.visible {
                opacity: 1;
            }
            /* Fix the popup being in the way when not visible */
            .popup:not(.visible) {
                pointer-events: none;
            }

        .visible .popup {
            pointer-events: auto;
        }
    </style>

    <script>
        function addListItem(iconSrc, name, version, source, downloadLink) {
            var letter = name.charAt(0).toUpperCase(); // Get the first letter of the name

            // Create a new listObj div
            var newListObj = document.createElement('div');
            newListObj.className = 'listObj';

            // Create an image element for the icon
            var iconElement = document.createElement('img');
            iconElement.className = 'icon';
            iconElement.src = iconSrc;

            // Create paragraph elements for other details
            var nameElement = document.createElement('p');
            nameElement.className = 'name';
            nameElement.textContent = name;

            var versionElement = document.createElement('p');
            versionElement.className = 'vers';
            versionElement.textContent = version;

            var sourceElement = document.createElement('p');
            sourceElement.className = 'serv';
            sourceElement.textContent = source;

            var downloadElement = document.createElement('a');
            downloadElement.className = downloadLink.startsWith('magnet:') ? 'down r' : 'down';
            downloadElement.href = downloadLink;
            downloadElement.textContent = downloadLink.startsWith('magnet:') ? 'Magnet' : 'Download';

            // Open link in a new tab if it's a download link
            if (!downloadLink.startsWith('magnet:')) {
                downloadElement.target = '_blank';
            } else {
                // Add onclick attribute for magnet links
                downloadElement.setAttribute('onclick', 'showPopup()');
            }

            // Append elements to the new listObj div
            newListObj.appendChild(iconElement);
            newListObj.appendChild(nameElement);
            newListObj.appendChild(versionElement);
            newListObj.appendChild(sourceElement);
            newListObj.appendChild(downloadElement);

            // Append the new listObj to the main container and the corresponding letter container
            document.getElementById('listContainer').appendChild(newListObj);
            document.getElementById(letter).appendChild(newListObj);

            var categories = document.querySelectorAll('.list');
            categories.forEach(function (category) {
                // Check if the category has no list items
                if (category.children.length <= 0) {
                    category.style.display = 'none'; // Hide the category
                } else {
                    category.style.display = 'block'; // Show the category
                }
            });
        }
