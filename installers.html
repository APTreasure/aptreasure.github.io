<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">
    <title>Installers</title>
    <style>
        /* Add colours */
        :root {
            --blue: rgb(132, 210, 255);
            --red: rgb(255, 127, 127);
            --green: rgb(126, 255, 132);
        }



        /* Adjust body */
        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e2328;
        }




        /* Fix list */
        .list, .popup {
            line-height: 0rem;
            color: white;
            font-weight: bold;
        }
        /* Align the list in boxes */
        .listObj {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        /* Adjust padding and enable boxes format for list objects */
        .listObj p, .listObj a {
            flex: 1;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            min-width: fit-content;
        }
        /* Make images the size of text, and circular */
        .listObj img {
            width: 20px;
            height: 20px;
            margin-left: 0.5rem;
            border-radius: 100%;
        }
        /* Make list objects not centered */
        .game, .serv { text-align: left; }
        .vers, .down { text-align: right; }

        /* Change the opacity of the versions from each list object */
        .vers {opacity: 30%;}
        /* Adjust colours */
        .down { color: var(--blue); }
        .r { color: var(--red); }
        .rb { border-color: var(--red); margin-left: 0.5rem;}
        .g { color: var(--green); }



        button { /* Change button */
            background-color: #21272c;
            border-radius: 1rem;
            border: 2px solid var(--blue);
            padding: 0.3rem 0rem 0.3rem 0rem;
            cursor: pointer;
        } .popupa.down { padding: 0rem 0.8rem 0rem 0.8rem; text-decoration: none;}



        /* Button */
        .popup, .popupObj {
            line-height: normal;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background-color: #21272c;
            border: 1px solid #303841;
            border-radius: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.2s; /* Add transition */
        }

        /* Change opacity when it has the visible class */
        .popup.visible { opacity: 1; }
        /* Fix the popup being in the way when not visible */
        .popup:not(.visible) { pointer-events: none; }
        .visible .popup { pointer-events: auto; }


    </style>
</head>
<body>

    <div class="list">

        <div class="listObj"> <!-- Geometry Dash -->
            <img class="icon"  src="icons/GeometryDash.png">
            <p class="game">        Geometry Dash</p>
            <p class="vers">        2.2</p>
            <p class="serv r">      APT - MEGA</p>
            <a class="down"   href="https://mega.nz/file/cTswyKyZ#5tIGtKYErAMYx66cWBY9xL8o9rztFYQhtjpU4Ukv8qs"   target="_blank">Download</a>
        </div>

        <div class="listObj"> <!-- Call of Duty: Ghosts -->
            <img class="icon"  src="icons/codghosts.png">
            <p class="name">        Call of Duty Ghosts</p>
            <p class="vers">        21</p>
            <p class="serv g">      DODI - Torrent</p>
            <a class="down r" href="magnet:?xt=urn:btih:JQP3DBMBUZKNBL6OYBGUN2VY34C3KKCE&dn=Call%20of%20Duty%20Ghosts%20-%20Deluxe%20Edition%20%5BUpdate%2021%5D%20-%20%5BDODI%20Repack%5D&tr=http%3A%2F%2Ftracker.trackerfix.com%3A80%2Fannounce" onclick="showPopup()">Magnet</a>
        </div>

    </div>

    
    <div id="popupObj">
        <div id="popup" class="popup"> <!-- Add visible class to make initally visible -->
            <h1 class="popupa">Have you got qBittorrent?</h1>
            <p class="popupa">You'll need qBittorrent or another torrenting program to open .torrent and magnet files!</p>
            <button class="popupa"><a class="popupa down" target="_blank" href="https://www.fosshub.com/qBittorrent.html?dwl=qbittorrent_4.6.2_x64_setup.exe">Download</a></button>
            <button class="popupa rb"><a class="popupa down r" onclick="closePopup()">I already have it!</a></button>
        </div>
    </div>



    <script>
        var popupShown = false;
    
        function showPopup() {
            if (!popupShown) {
                document.getElementById('popup').classList.add('visible');
                popupShown = true;
            }
        }
    
        function closePopup() {
            document.getElementById('popup').classList.remove('visible');
        }
    </script>

</body>
</html>
